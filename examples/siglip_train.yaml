# SigLIP: improved CLIP with sigmoid loss
# Stable training with larger batches
# Optimized for 24GB consumer-grade GPUs

model_name: google/siglip-base-patch16-224
encoder_mode: siglip
use_lora: true
loss_type: sigmoid

# Memory optimization: Gradient Cache for 24GB GPU
# Reduces memory by ~4× at slight speed cost (slower iterations)
# For larger GPUs (40GB+), disable Gradient Cache for faster training:
#   use_gradient_cache: false
use_gradient_cache: true
gradient_cache_chunk_size: 128

output_dir: experiments/output_siglip
epochs: 1
batch_size: 1024
learning_rate: 1.0e-04

data_path: data/train.jsonl
val_data_path: data/val.jsonl
image_root: data/images
