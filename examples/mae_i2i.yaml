# MAE ViT-Base for image-to-image retrieval on SOP
# Masked Autoencoder with mean pooling
# Optimized for 24GB consumer-grade GPUs

model_name: facebook/vit-mae-base
encoder_mode: mae
retrieval_mode: "i2i"
use_lora: false
loss_type: infonce
pooling_method: mean

# Memory optimization: Gradient Cache for 24GB GPU
# Reduces memory by ~4× at slight speed cost (slower iterations)
# For larger GPUs (40GB+), disable Gradient Cache for faster training:
#   use_gradient_cache: false
use_gradient_cache: true
gradient_cache_chunk_size: 128

output_dir: experiments/output_sop_mae_i2i
epochs: 1
batch_size: 1024
learning_rate: 1.0e-04

data_path: data/stanford_online_products/train.jsonl
val_data_path: data/stanford_online_products/val.jsonl
image_root: data/stanford_online_products

report_to: none
logging_steps: 10
save_steps: 1000
