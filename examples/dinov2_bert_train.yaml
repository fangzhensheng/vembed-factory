# Composed encoder: DINOv2-small + BERT
# Combines vision and text encoders for retrieval tasks

model_name: facebook/dinov2-small
encoder_mode: composed
use_lora: true

output_dir: experiments/output_dinov2_bert
epochs: 3
batch_size: 1024
eval_batch_size: 64
learning_rate: 1.0e-04
use_gradient_cache: true
gradient_cache_chunk_size: 128

data_path: data/train.jsonl
val_data_path: data/val.jsonl
image_root: data/images
